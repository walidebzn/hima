<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HIMA Test</title>
<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#f5f3ec;height:100vh;display:flex;flex-direction:column}
.top{background:#264414;padding:52px 20px 16px;text-align:center;flex-shrink:0}
.av{width:90px;height:90px;border-radius:50%;overflow:hidden;margin:0 auto 10px;border:3px solid #DDE255}
.av img{width:100%;height:100%;object-fit:cover}
h1{color:white;font-size:26px;margin:0}
p{color:rgba(255,255,255,.5);font-size:12px;margin:4px 0 0}
.msgs{flex:1;overflow-y:auto;padding:16px}
.msg{display:flex;gap:8px;margin-bottom:8px}
.msg-av{width:32px;height:32px;border-radius:10px;overflow:hidden;flex-shrink:0}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg-b{background:white;border:1px solid rgba(38,68,20,.1);border-radius:16px 16px 16px 4px;padding:12px 14px;font-size:14px;line-height:1.6;max-width:82%}
.user{flex-direction:row-reverse}
.user .msg-b{background:#264414;color:white;border-radius:16px 16px 4px 16px}
.dots{display:flex;gap:5px;padding:4px}
.dot{width:7px;height:7px;border-radius:50%;animation:td 1.2s infinite}
.dot:nth-child(1){background:#F35695}.dot:nth-child(2){background:#F98805;animation-delay:.15s}.dot:nth-child(3){background:#DDE255;animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.bottom{flex-shrink:0;background:white;border-top:1px solid rgba(38,68,20,.1);padding:12px 16px 32px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;min-height:8px}
.chip{padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid rgba(38,68,20,.15);background:white;color:#0F0F0A}
.chip:active{transform:scale(.95)}
.chip.sel{background:#264414;color:#DDE255;border-color:transparent}
.row{display:flex;gap:8px}
input{flex:1;background:#F5F3EC;border:1.5px solid rgba(38,68,20,.1);border-radius:14px;padding:13px 16px;font-size:15px;outline:none}
input:focus{border-color:#F35695}
button.send{width:48px;height:48px;border-radius:14px;background:#264414;border:none;cursor:pointer;color:#DDE255;font-size:20px;display:flex;align-items:center;justify-content:center}
</style>
</head>

  <div class="chips" id="chips"></div>

<script>
var U = {};
var step = 0;
var steps = [
  {q: ["Salut ! Je suis HIMA, ton coach sport et nutrition.", "Je suis la uniquement pour toi - seances, macros, recup.", "Quel est ton prenom ?"], type: 'text', key: 'prenom'},
  {qf: function() { return ["Super " + U.prenom + " ! Quel age as-tu ?"]; }, type: 'text', key: 'age', num: true},
  {qf: function() { return ["Tu es ?"]; }, type: 'chips', key: 'sexe', opts: [{"v":"f","l":"Femme"}, {"v":"m","l":"Homme"}]},
  {qf: function() { return ["Ton mode !"]; }, type: 'chips', key: 'mode', opts: [{"v":"glow","l":"Ton Glow Up"}, {"v":"bodybuilding","l":"A ton prime"}, {"v":"hyrox","l":"Race Ready"}]},
  {qf: function() { return ["Ton objectif ?"]; }, type: 'chips', key: 'obj', opts: [{"v":"perte","l":"Perdre du poids"}, {"v":"muscle","l":"Prendre du muscle"}, {"v":"mixte","l":"Rééquilibrage"}]},
  {qf: function() { return ["Ton poids en kg ?"]; }, type: 'text', key: 'poids', num: true},
  {qf: function() { return ["Ta taille en cm ?"]; }, type: 'text', key: 'taille', num: true},
  {qf: function() { return ["Niveau sportif ?"]; }, type: 'chips', key: 'niv', opts: [{"v":"deb","l":"Debutant"}, {"v":"int","l":"Intermediaire"}, {"v":"av","l":"Avance"}]},
  {qf: function() { return ["Temps par seance ?"]; }, type: 'chips', key: 'tps', opts: [{"v":"20m","l":"20 min"}, {"v":"30m","l":"30 min"}, {"v":"45m","l":"45 min"}, {"v":"60m","l":"60 min+"}]},
  {qf: function() { return ["Ou tu t entraines ?"]; }, type: 'chips', key: 'lieu', opts: [{"v":"maison","l":"Maison"}, {"v":"salle","l":"Salle"}, {"v":"mixte","l":"Les deux"}]},
  {qf: function() {
    U.poids = parseFloat(U.poids) || 75;
    U.taille = parseInt(U.taille) || 170;
    var m = calcM();
    return ["Parfait " + U.prenom + " ! Tout configure.", "Tes besoins : " + m.kcal + " kcal/jour, " + m.prot + "g proteines.", "C est parti !"];
  }, type: 'go', key: null}
];

function calcM() {
  var p = U.poids || 75, t = U.taille || 170, a = parseInt(U.age) || 26;
  var mb = U.sexe === 'f' ? (10*p + 6.25*t - 5*a - 161) : (10*p + 6.25*t - 5*a + 5);
  var td = mb * 1.375;
  if(U.obj === 'perte') td -= 400;
  else if(U.obj === 'muscle') td += 200;
  var kcal = Math.round(td);
  var prot = Math.round(p * 2);
  var lip = Math.round((kcal * .28) / 9);
  var gluc = Math.round((kcal - prot*4 - lip*9) / 4);
  return {kcal:kcal, prot:prot, gluc:gluc, lip:lip};
}

function addHima(msgs, cb) {
  var i = 0;
  function next() {
    if(i >= msgs.length) { if(cb) cb(); return; }
    showTyping(function() {
      var m = document.getElementById('msgs');

function addUser(txt) {
  var m = document.getElementById('msgs');
  var g = document.createElement('div'); g.className = 'msg user';
  var av = document.createElement('div'); av.className = 'msg-av';
  av.style.cssText = 'background:#F35695;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px';
  av.textContent = (U.prenom || txt || 'U')[0].toUpperCase();
  var b = document.createElement('div'); b.className = 'msg-b';
  b.textContent = txt;
  g.appendChild(av); g.appendChild(b);
  m.appendChild(g); scrl();
}

function scrl() {
  var m = document.getElementById('msgs');
  if(m) setTimeout(function() { m.scrollTop = m.scrollHeight; }, 50);
}

function showStep(i) {
  if(i >= steps.length) return;
  var s = steps[i];
  var msgs = s.q || (s.qf ? s.qf() : []);
  var chips = document.getElementById('chips');
  var inp = document.getElementById('inp');
  chips.innerHTML = '';
  inp.style.display = 'none';
  document.querySelector('.send').style.display = 'none';

  addHima(msgs, function() {
    if(s.type === 'chips') {
      (s.opts || []).forEach(function(o) {
        var c = document.createElement('div');
        c.className = 'chip';
        c.textContent = o.l;
        c.onclick = function() {
          document.querySelectorAll('.chip').forEach(function(x) { x.classList.remove('sel'); });
          c.classList.add('sel');
          U[s.key] = o.v;
          setTimeout(function() { choose(o.l); }, 200);
        };
        chips.appendChild(c);
      });
    } else if(s.type === 'text') {
      inp.style.display = 'block';
      inp.type = s.num ? 'number' : 'text';
      inp.placeholder = 'Ecris ta reponse...';
      inp.value = '';
      document.querySelector('.send').style.display = 'flex';
      setTimeout(function() { inp.focus(); }, 100);
    } else if(s.type === 'go') {
      var btn = document.createElement('div');
      btn.className = 'chip sel';
      btn.style.cssText = 'width:100%;text-align:center;padding:14px;font-size:14px;cursor:pointer';
      btn.textContent = 'Commencer maintenant !';
      btn.onclick = function() {
        localStorage.setItem('hima4', JSON.stringify(U));
        alert('Programme configure ! Bienvenue ' + U.prenom + ' !');
      };
      chips.appendChild(btn);
    }
  });
}

function send() {
  var inp = document.getElementById('inp');
  var v = inp.value.trim();
  if(!v) return;
  var s = steps[step];
  if(s && s.key) U[s.key] = v;
  choose(v);
}

function choose(txt) {
  addUser(txt);
  document.getElementById('inp').value = '';
  step++;
  setTimeout(function() { showStep(step); }, 200);
}

// START
setTimeout(function() { showStep(0); }, 500);
</script>
