<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>HIMA Test</title>
<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background:#f5f3ec;height:100vh;display:flex;flex-direction:column}
.top{background:#264414;padding:52px 20px 16px;text-align:center;flex-shrink:0}
.av{width:90px;height:90px;border-radius:50%;overflow:hidden;margin:0 auto 10px;border:3px solid #DDE255}
.av img{width:100%;height:100%;object-fit:cover}
h1{color:white;font-size:26px;margin:0}
p{color:rgba(255,255,255,.5);font-size:12px;margin:4px 0 0}
.msgs{flex:1;overflow-y:auto;padding:16px}
.msg{display:flex;gap:8px;margin-bottom:8px}
.msg-av{width:32px;height:32px;border-radius:10px;overflow:hidden;flex-shrink:0}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg-b{background:white;border:1px solid rgba(38,68,20,.1);border-radius:16px 16px 16px 4px;padding:12px 14px;font-size:14px;line-height:1.6;max-width:82%}
.user{flex-direction:row-reverse}
.user .msg-b{background:#264414;color:white;border-radius:16px 16px 4px 16px}
.dots{display:flex;gap:5px;padding:4px}
.dot{width:7px;height:7px;border-radius:50%;animation:td 1.2s infinite}
.dot:nth-child(1){background:#F35695}.dot:nth-child(2){background:#F98805;animation-delay:.15s}.dot:nth-child(3){background:#DDE255;animation-delay:.3s}
@keyframes td{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.bottom{flex-shrink:0;background:white;border-top:1px solid rgba(38,68,20,.1);padding:12px 16px 32px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;min-height:8px}
.chip{padding:10px 18px;border-radius:24px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid rgba(38,68,20,.15);background:white;color:#0F0F0A}
.chip:active{transform:scale(.95)}
.chip.sel{background:#264414;color:#DDE255;border-color:transparent}
.row{display:flex;gap:8px}
input{flex:1;background:#F5F3EC;border:1.5px solid rgba(38,68,20,.1);border-radius:14px;padding:13px 16px;font-size:15px;outline:none}
input:focus{border-color:#F35695}
button.send{width:48px;height:48px;border-radius:14px;background:#264414;border:none;cursor:pointer;color:#DDE255;font-size:20px;display:flex;align-items:center;justify-content:center}
</style>
</head>

function calcM() {
  var p = U.poids || 75, t = U.taille || 170, a = parseInt(U.age) || 26;
  var mb = U.sexe === 'f' ? (10*p + 6.25*t - 5*a - 161) : (10*p + 6.25*t - 5*a + 5);
  var td = mb * 1.375;
  if(U.obj === 'perte') td -= 400;
  else if(U.obj === 'muscle') td += 200;
  var kcal = Math.round(td);
  var prot = Math.round(p * 2);
  var lip = Math.round((kcal * .28) / 9);
  var gluc = Math.round((kcal - prot*4 - lip*9) / 4);
  return {kcal:kcal, prot:prot, gluc:gluc, lip:lip};
}

function addUser(txt) {
  var m = document.getElementById('msgs');
  var g = document.createElement('div'); g.className = 'msg user';
  var av = document.createElement('div'); av.className = 'msg-av';
  av.style.cssText = 'background:#F35695;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px';
  av.textContent = (U.prenom || txt || 'U')[0].toUpperCase();
  var b = document.createElement('div'); b.className = 'msg-b';
  b.textContent = txt;
  g.appendChild(av); g.appendChild(b);
  m.appendChild(g); scrl();
}

function scrl() {
  var m = document.getElementById('msgs');
  if(m) setTimeout(function() { m.scrollTop = m.scrollHeight; }, 50);
}

function showStep(i) {
  if(i >= steps.length) return;
  var s = steps[i];
  var msgs = s.q || (s.qf ? s.qf() : []);
  var chips = document.getElementById('chips');
  var inp = document.getElementById('inp');
  chips.innerHTML = '';
  inp.style.display = 'none';
  document.querySelector('.send').style.display = 'none';

  addHima(msgs, function() {
    if(s.type === 'chips') {
      (s.opts || []).forEach(function(o) {
        var c = document.createElement('div');
        c.className = 'chip';
        c.textContent = o.l;
        c.onclick = function() {
          document.querySelectorAll('.chip').forEach(function(x) { x.classList.remove('sel'); });
          c.classList.add('sel');
          U[s.key] = o.v;
          setTimeout(function() { choose(o.l); }, 200);
        };
        chips.appendChild(c);
      });
    } else if(s.type === 'text') {
      inp.style.display = 'block';
      inp.type = s.num ? 'number' : 'text';
      inp.placeholder = 'Ecris ta reponse...';
      inp.value = '';
      document.querySelector('.send').style.display = 'flex';
      setTimeout(function() { inp.focus(); }, 100);
    } else if(s.type === 'go') {
      var btn = document.createElement('div');
      btn.className = 'chip sel';
      btn.style.cssText = 'width:100%;text-align:center;padding:14px;font-size:14px;cursor:pointer';
      btn.textContent = 'Commencer maintenant !';
      btn.onclick = function() {
        localStorage.setItem('hima4', JSON.stringify(U));
        document.body.innerHTML = '<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#264414;color:white;text-align:center;padding:30px"><div style="font-size:60px;margin-bottom:20px">🎉</div><div style="font-family:sans-serif;font-size:28px;font-weight:900;letter-spacing:1px;margin-bottom:10px">HIMA</div><div style="font-size:16px;opacity:.7;margin-bottom:32px">Ton coach, partout avec toi</div><div style="background:white;color:#264414;border-radius:16px;padding:20px;max-width:320px;width:100%;margin-bottom:14px;cursor:pointer" onclick="startPro()"><div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#F35695;margin-bottom:8px">PRO</div><div style="font-size:36px;font-weight:900;color:#0F0F0A">29€<span style="font-size:14px;color:#888">/mois</span></div><div style="font-size:12px;color:#666;margin:8px 0">7 jours gratuits · HIMA illimitée · Macros · Programme · Recettes</div><div style="background:#264414;color:#DDE255;border-radius:10px;padding:12px;font-weight:700;font-size:15px">Essayer 7 jours gratuits</div></div><div style="color:rgba(255,255,255,.4);font-size:13px;cursor:pointer" onclick="startFree()">Continuer gratuitement →</div></div>';
        window.startFree = function() { 
          localStorage.setItem('hima4', JSON.stringify(U));
          window.location.href = window.location.href.split('?')[0] + '?app=1';
        };
        window.startPro = function() { 
          U.plan = 'pro';
          localStorage.setItem('hima4', JSON.stringify(U));
          window.location.href = window.location.href.split('?')[0] + '?app=1';
        };
      };
      chips.appendChild(btn);
    }
  });
}

function send() {
  var inp = document.getElementById('inp');
  var v = inp.value.trim();
  if(!v) return;
  var s = steps[step];
  if(s && s.key) U[s.key] = v;
  choose(v);
}

function choose(txt) {
  addUser(txt);
  document.getElementById('inp').value = '';
  step++;
  setTimeout(function() { showStep(step); }, 200);
}

// BOOT - check if already configured
var saved = null;
try { saved = localStorage.getItem('hima4'); } catch(e) {}
var params = window.location.search;

if(saved && (params.includes('app=1') || params.includes('app'))) {
  // Go to app
  try { U = JSON.parse(saved); } catch(e) { U = {}; }
  showApp();
} else if(saved && !params.includes('reset')) {
  // Already done onboarding, show paywall or app
  try { U = JSON.parse(saved); } catch(e) { U = {}; }
  if(U.plan) {
    showApp();
  } else {
    showPaywall();
  }
} else {
  // Fresh start
  setTimeout(function() { showStep(0); }, 500);
}

window.switchTab = function(tab) {
  ['accueil','chat','prog','corps'].forEach(function(t) {
    var el = document.getElementById('tab-'+t);
    if(el) {
      el.style.borderBottom = t===tab ? '2px solid #F35695' : 'none';
      el.querySelector('div:last-child').style.color = t===tab ? '#F35695' : '#888';
      el.querySelector('div:last-child').style.fontWeight = t===tab ? '700' : '600';
    }
  });
  var content = document.getElementById('tab-content');
  if(!content) return;
  if(tab==='accueil') renderAccueil(content);
  else if(tab==='chat') renderChat(content);
  else if(tab==='prog') renderProg(content);
  else if(tab==='corps') renderCorps(content);
};

function startChatMsgs() {
  var h = new Date().getHours();
  var sal = h<12?'Bonjour':h<18?'Bon après-midi':'Bonsoir';
  addChatMsg('hima', sal + ' ' + (U.prenom||'') + ' ! Je suis HIMA, ton coach sport et nutrition. Je réponds uniquement à ce qui touche ton corps et tes performances. Pour le reste, d\'autres experts sont là !');
  setTimeout(function() {
    addChatMsg('hima', 'Comment tu te sens ce matin ? Énergie sur 10 et sommeil sur 10 — j\'adapte ta séance en fonction.');
  }, 900);
}

  var g = document.createElement('div');
  g.style.cssText = 'display:flex;gap:8px;align-items:flex-end;margin-bottom:7px;animation:aMsg .2s ease;' + (who==='user'?'flex-direction:row-reverse':'');
  if(who==='hima') {
    var av = document.createElement('div');
    av.style.cssText = 'width:34px;height:34px;border-radius:12px;overflow:hidden;flex-shrink:0';
    av.innerHTML = '<img src="' + IMG + '" style="width:100%;height:100%;object-fit:cover">';
    g.appendChild(av);
  } else {
    var uav = document.createElement('div');
    uav.style.cssText = 'width:34px;height:34px;border-radius:12px;background:#F35695;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;flex-shrink:0';

  var b = document.createElement('div');
  b.style.cssText = who==='hima' ?
    'padding:13px 16px;background:white;border:1.5px solid rgba(38,68,20,.1);border-radius:18px 18px 18px 4px;font-size:14px;line-height:1.65;color:#0F0F0A;max-width:83%;word-break:break-word' :
    'padding:13px 16px;background:#264414;border-radius:18px 18px 4px 18px;font-size:14px;line-height:1.65;color:white;max-width:83%;word-break:break-word';

window.chatSend = function(txt) {
  if(!txt) {
    var inp = document.getElementById('chat-inp');
    txt = inp ? inp.value.trim() : '';
  }
  if(!txt || chatBusy) return;
  var inp2 = document.getElementById('chat-inp');
  if(inp2) inp2.value = '';
  addChatMsg('user', txt);
  chatBusy = true;
  addChatTyping();
  var NO = ['amour','relation','politique','argent','finance','programmation','film','serie','musique','meteo','actualite'];
  var isOff = false;
  for(var i=0;i<NO.length;i++) { if(txt.toLowerCase().includes(NO[i])) { isOff=true; break; } }
  if(isOff) {
    setTimeout(function() {
      var t = document.getElementById('chat-typ'); if(t) t.remove();
      addChatMsg('hima', 'Ce sujet dépasse mon domaine. Je suis HIMA — uniquement sport et nutrition. Tu veux parler de ta séance ou d\'une recette ?');
      chatBusy = false;
    }, 700);
    return;
  }
  var m = calcM();
  var sys = 'Tu es HIMA coach sportif IA. Tu reponds UNIQUEMENT sport, nutrition, recuperation. Tutoie. Reponds conversationnellement, personnalise, 2-3 paragraphes, question de suivi. Profil: ' + (U.prenom||'') + ' ' + (U.age||25) + 'ans ' + (U.sexe==='f'?'F':'H') + ' ' + (U.poids||75) + 'kg mode:' + (U.mode||'glow') + ' macros:' + m.kcal + 'kcal ' + m.prot + 'g prot.';
  var apiKey = U.apiKey || KEY || '';
  if(!apiKey) {
    setTimeout(function() {
      var t = document.getElementById('chat-typ'); if(t) t.remove();
      addChatMsg('hima', localReply(txt));
      chatBusy = false;
    }, 800);
    return;
  }
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:sys,messages:chatLog.slice(-12)})
  }).then(function(r) { return r.json(); }).then(function(d) {
    var t = document.getElementById('chat-typ'); if(t) t.remove();
    addChatMsg('hima', d.content && d.content[0] ? d.content[0].text : localReply(txt));
    chatBusy = false;
  }).catch(function() {
    var t = document.getElementById('chat-typ'); if(t) t.remove();
    addChatMsg('hima', localReply(txt));
    chatBusy = false;
  });
};

function localReply(msg) {
  var l = msg.toLowerCase(); var m = calcM(); var p = U.prenom||'';
  if(/running|footing|course/i.test(l)) return 'Parfait ' + p + ' ! Running ce soir : 5 min échauffement marche, puis zone 2 (tu peux parler) 25-35 min, 5 min retour calme. Zone 2 = 65-75% FC max. Tu brûles les graisses et tu progresses. Ton niveau en course ?';
  if(/seance|entrainement|exercice|programme/i.test(l)) return 'Ta séance du jour est prête ' + p + '. Construite pour toi. Respecte les temps de repos — ils font partie de la progression !';
  if(/recette|gourmand/i.test(l)) return 'Voilà une idée gourmande et dans tes macros ' + p + ' ! Tu veux une autre option ?';
  if(/menu|manger|repas|diner/i.test(l)) return 'Pour ce soir ' + p + ' avec tes ' + m.kcal + ' kcal : 150g protéines (poulet/saumon), 150g féculent cuit, légumes à volonté. Simple, efficace, dans tes macros.';
  if(/dormi|sommeil|fatigue/i.test(l)) return 'Je prends note ' + p + '. Mauvaise nuit = récup impactée. Séance allégée aujourd\'hui, couche-toi 30 min plus tôt ce soir. Qu\'est-ce qui perturbe ton sommeil ?';
  if(/craque|pizza|burger/i.test(l)) return 'Un écart ça arrive. Ce soir tu manges léger et demain tu reprends normalement. La vraie discipline c\'est de reprendre sans culpabilité. Comment tu te sens ?';
  if(/progression|bilan/i.test(l)) return 'Bilan ' + p + ' : ' + (U.poids||'--') + ' kg — ' + m.kcal + ' kcal/jour — ' + m.prot + 'g protéines. Tu es sur la bonne voie. Continue !';
  if(/energie|\d+.*10/i.test(l)) return 'Noté ! J\'adapte ta séance du jour en fonction. Tu veux voir le programme ?';
  return 'Je suis là pour toi ' + p + ', 24h/24. Sport, nutrition, récupération — dis-moi ce qui est le plus important maintenant.';
}

/* EYE TRACKING */
(function() {
  function track(px, py) {
    var svg = document.getElementById('hima-eyes');
    if (!svg) return;
    var rect = svg.getBoundingClientRect();
    if (!rect.width) return;
    var scX = 90 / rect.width;
    var scY = 90 / rect.height;
    function mv(pid, gid, ox, oy) {
      var sx = (px - rect.left) * scX;
      var sy = (py - rect.top) * scY;
      var dx = sx - ox, dy = sy - oy;
      var dist = Math.sqrt(dx*dx + dy*dy);
      var r = Math.min(dist / 10, 5);
      var a = Math.atan2(dy, dx);
      var ex = ox + r * Math.cos(a);
      var ey = oy + r * Math.sin(a);
      var p = document.getElementById(pid);
      var g = document.getElementById(gid);
      if (p) { p.setAttribute('cx', ex.toFixed(1)); p.setAttribute('cy', ey.toFixed(1)); }
      if (g) { g.setAttribute('cx', (ex+2).toFixed(1)); g.setAttribute('cy', (ey-2).toFixed(1)); }
    }
    mv('el', 'elg', 33, 32);
    mv('er', 'erg', 57, 32);
    // Head tilt
    var wrap = document.getElementById('hima-av-wrap');
    if (wrap) {
      var wr = wrap.getBoundingClientRect();
      var cx = wr.left + wr.width / 2;
      var cy = wr.top + wr.height / 2;
      var hx = ((px - cx) * 0.02).toFixed(1);
      var hy = ((py - cy) * 0.012).toFixed(1);
      wrap.style.transform = 'rotate(' + hx + 'deg) translateY(' + hy + 'px)';
    }
  }
  document.addEventListener('mousemove', function(e) { track(e.clientX, e.clientY); });
  document.addEventListener('touchmove', function(e) {
    if (e.touches && e.touches[0]) track(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
})();
