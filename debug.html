<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>HIMA Debug</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { 
  font-family: sans-serif; 
  background: #f0f0f0;
  overflow: hidden;
}
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 20px;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 1;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}
.nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 60px;
  background: white;
  border-top: 1px solid #ddd;
  display: flex;
  z-index: 100;
}
.nb {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: rgba(0,0,0,0.1);
}
.nb.active { color: orange; font-weight: bold; }
#log {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.8);
  color: lime;
  font-size: 11px;
  padding: 4px 8px;
  z-index: 999;
  max-height: 80px;
  overflow-y: auto;
  font-family: monospace;
}
button {
  padding: 16px 32px;
  background: orange;
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  -webkit-tap-highlight-color: rgba(0,0,0,0.2);
}
input {
  padding: 14px;
  border: 2px solid #ddd;
  border-radius: 12px;
  font-size: 16px;
  width: 100%;
  max-width: 300px;
  -webkit-appearance: none;
}
.result {
  font-size: 20px;
  font-weight: bold;
  color: green;
  min-height: 30px;
}
</style>
</head>
<body>

<div id="log">Chargement...</div>

<!-- SCREEN 1: HOME -->
<div class="screen active" id="s-home">
  <h2>🏠 ACCUEIL</h2>
  <button onclick="log('BUTTON CLICKED ✅'); this.style.background='green'">
    CLIQUER ICI
  </button>
  <div class="result" id="r1"></div>
  <input type="text" placeholder="Taper ici..." oninput="log('INPUT: '+this.value)">
</div>

<!-- SCREEN 2: COACH -->
<div class="screen" id="s-coach">
  <h2>🤖 COACH</h2>
  <button onclick="log('COACH BTN ✅'); this.style.background='green'">
    CLIQUER COACH
  </button>
  <input type="text" placeholder="Message au coach..." oninput="log('COACH MSG: '+this.value)">
</div>

<!-- SCREEN 3: PROFIL -->
<div class="screen" id="s-profil">
  <h2>👤 PROFIL</h2>
  <p>Screen profil actif</p>
  <button onclick="log('PROFIL BTN ✅'); this.style.background='green'">
    CLIQUER PROFIL
  </button>
</div>

<!-- NAV -->
<div class="nav">
  <div class="nb active" id="nb-home" onclick="showScreen('home')">🏠<br>Accueil</div>
  <div class="nb" id="nb-coach" onclick="showScreen('coach')">🤖<br>Coach</div>
  <div class="nb" id="nb-profil" onclick="showScreen('profil')">👤<br>Profil</div>
</div>

<script>
var logs = [];
function log(msg) {
  logs.unshift(new Date().toISOString().slice(11,19) + ' ' + msg);
  document.getElementById('log').textContent = logs.slice(0,5).join(' | ');
  console.log(msg);
}

function showScreen(id) {
  log('showScreen: ' + id);
  document.querySelectorAll('.screen').forEach(function(s) {
    s.classList.remove('active');
  });
  document.querySelectorAll('.nb').forEach(function(n) {
    n.classList.remove('active');
  });
  var s = document.getElementById('s-' + id);
  var n = document.getElementById('nb-' + id);
  if (s) s.classList.add('active');
  if (n) n.classList.add('active');
}

window.addEventListener('DOMContentLoaded', function() {
  log('DOM ready');
});

window.addEventListener('touchstart', function(e) {
  log('TOUCH: ' + e.target.tagName + '.' + e.target.className.split(' ')[0]);
}, {passive: true});

log('Script loaded - iOS: ' + /iPhone|iPad/.test(navigator.userAgent));
</script>
</body>
</html>
